[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM7
monitor_port = COM7
lib_deps =
    ESP32Async/ESPAsyncWebServer @ ^3.7.0
    ESP32Async/AsyncTCP @ ^3.3.2
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.2.1
    bodmer/TFT_eSPI
    paulstoffregen/XPT2046_Touchscreen
    tzapu/WiFiManager
    ayushsharma82/ElegantOTA
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    ; TFT_eSPI configured entirely via build flags (not User_Setup.h) so `pio lib update` never
    ; clobbers the pin config - same rig/pinout as the Haustuerklingel project. USE_HSPI_PORT puts
    ; TFT_eSPI's own SPI instance on HSPI/SPI2, separate from XPT2046_Touchscreen which always uses
    ; the global Arduino `SPI` object on its native VSPI/SPI3 pins (18/19/23) - real separate buses.
    -DUSER_SETUP_LOADED=1
    -DUSE_HSPI_PORT=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MOSI=4
    -DTFT_SCLK=14
    -DTFT_CS=17
    -DTFT_DC=21
    -DTFT_RST=16
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000

extra_scripts = pre:get_git_version.py
